services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_hunter
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    healthcheck: 
        test: ["CMD", "curl", "-f", "http://localhost:3306"] 
        interval: 30s 
        timeout: 10s 
        retries: 5 
    networks:
      - backend


  analytics-api:
    build: ./analytics
    container_name: analytucs-api
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT": 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: digital_hunter
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
